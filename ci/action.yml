name: 'Code Wiki Update'
description: 'Detect code changes and create a PR with updated wiki content'
inputs:
  wiki-scope:
    description: 'Update scope: "changed" (default) or "full"'
    required: false
    default: 'changed'
  token:
    description: 'GitHub token for creating PRs'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install Code Wiki
      shell: bash
      run: npm install -g code-wiki-server

    - name: Detect changes and update wiki
      shell: bash
      run: |
        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1)

        if [ -z "$CHANGED_FILES" ]; then
          echo "No source file changes detected — skipping wiki update"
          exit 0
        fi

        echo "Changed files:"
        echo "$CHANGED_FILES"

        # Run wiki update
        if [ "${{ inputs.wiki-scope }}" = "full" ]; then
          npx code-wiki-server --update --scope=full
        else
          npx code-wiki-server --update --scope=changed
        fi

    - name: Check for wiki changes
      id: wiki-diff
      shell: bash
      run: |
        if git diff --quiet .code-wiki/team/; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No wiki changes detected"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Wiki changes detected:"
          git diff --stat .code-wiki/team/
        fi

    - name: Create wiki update PR
      if: steps.wiki-diff.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        BRANCH_NAME="wiki-update-$(date +%Y%m%d-%H%M%S)"

        git config user.name "code-wiki[bot]"
        git config user.email "code-wiki[bot]@users.noreply.github.com"
        git checkout -b "$BRANCH_NAME"
        git add .code-wiki/team/
        git commit -m "docs(wiki): auto-update wiki content

        Generated by Code Wiki CI action.
        Source: ${{ github.sha }}"

        git push origin "$BRANCH_NAME"

        gh pr create \
          --title "docs(wiki): auto-update wiki content" \
          --body "## Wiki Update

        This PR was automatically generated by the Code Wiki CI action.

        **Trigger:** Commit \`${{ github.sha }}\`
        **Scope:** ${{ inputs.wiki-scope }}

        Review the wiki changes to ensure accuracy before merging." \
          --label "documentation" \
          --label "automated"
