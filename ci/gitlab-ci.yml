# Code Wiki — GitLab CI Template
# Add this to your .gitlab-ci.yml or include it with:
#   include:
#     - local: '/path/to/gitlab-ci.yml'

wiki-update:
  stage: deploy
  image: node:20
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "src/**/*"
        - "lib/**/*"
        - "pkg/**/*"
        - "app/**/*"
  variables:
    WIKI_SCOPE: "changed"
  before_script:
    - npm install -g code-wiki-server
    - git config user.name "code-wiki[bot]"
    - git config user.email "code-wiki[bot]@users.noreply.gitlab.com"
  script:
    - |
      if [ "$WIKI_SCOPE" = "full" ]; then
        npx code-wiki-server --update --scope=full
      else
        npx code-wiki-server --update --scope=changed
      fi
    - |
      if git diff --quiet .code-wiki/team/; then
        echo "No wiki changes — skipping MR"
        exit 0
      fi
    - |
      echo "Wiki changes detected:"
      git diff --stat .code-wiki/team/
    - |
      BRANCH_NAME="wiki-update-$(date +%Y%m%d-%H%M%S)"
      git checkout -b "$BRANCH_NAME"
      git add .code-wiki/team/
      git commit -m "docs(wiki): auto-update wiki content

      Source: ${CI_COMMIT_SHA}"
      git push origin "$BRANCH_NAME"
    - |
      # Create merge request via GitLab API
      curl -s -X POST \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests" \
        -H "PRIVATE-TOKEN: ${WIKI_BOT_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{
          \"source_branch\": \"${BRANCH_NAME}\",
          \"target_branch\": \"${CI_DEFAULT_BRANCH}\",
          \"title\": \"docs(wiki): auto-update wiki content\",
          \"description\": \"## Wiki Update\\n\\nAuto-generated by Code Wiki CI.\\n\\n**Trigger:** ${CI_COMMIT_SHA}\\n**Scope:** ${WIKI_SCOPE}\",
          \"labels\": \"documentation,automated\"
        }"
  artifacts:
    paths:
      - .code-wiki/team/
    expire_in: 7 days
